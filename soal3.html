<!DOCTYPE html>
<html>
<head>
    <title>2473023 Abraham Christopher Irtan </title>
</head>
<body>

<form action="" method="POST">
    
    <table border="0" cellpadding="5" cellspacing="0">
        <tr>
            <td colspan="3"><h2>Form Tambah Data User</h2></td>
        </tr>
        
        <tr>
            <td>Name</td>
            <td>:</td>
            <td>
                <input type="text" name="name" required 
                       oninvalid="this.setCustomValidity('Name is required!!!')" 
                       oninput="this.setCustomValidity('')">
            </td>
        </tr>
        
        <tr>
            <td>Address</td>
            <td>:</td>
            <td>
                <input type="text" name="address" required 
                       oninvalid="this.setCustomValidity('Address is required!!!')" 
                       oninput="this.setCustomValidity('')">
            </td>
        </tr>
        
        <tr>
            <td>Email</td>
            <td>:</td>
            <td>
                <input type="email" name="email" required>
            </td>
        </tr>
        
        <tr>
            <td>Home Page</td>
            <td>:</td>
            <td><input type="url" name="homepage"></td>
        </tr>
        
        <tr>
            <td>Birthday</td>
            <td>:</td>
            <td><input type="date" name="birthday"></td>
        </tr>
        
        <tr>
            <td>Favorit Color</td>
            <td>:</td>
            <td><input type="color" name="color"></td>
        </tr>
        
        <tr>
            <td>IPK</td>
            <td>:</td>
            <td>
                <input type="number" name="ipk" min="0" max="4" step="0.1" value="0">
            </td>
        </tr>
        
        <tr>
            <td>Phone Number</td>
            <td>:</td>
            <td>
                <input type="text" name="phone" pattern="[0-9]{3}-[0-9]{7,10}" title="Format: ###-####### (3 angka didepan, 7-10 angka dibelakang)">
            </td>
        </tr>
        
        <tr>
            <td></td>
            <td></td>
            <td>
                <input type="submit" value="Add">
            </td>
        </tr>
    </table>

</form>

</body>
</html>
